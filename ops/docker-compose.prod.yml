version: "3.8"

# ============================================================
# MDM 平台生产环境 docker-compose 配置
# 使用方式: docker-compose -f docker-compose.prod.yml up -d
# ============================================================

networks:
  mdm-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  emqx_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/emqx

services:
  # PostgreSQL 15 - 主数据库
  postgres:
    image: postgres:15-alpine
    container_name: mdm-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-mdm_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问，不对外暴露
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm_user} -d ${POSTGRES_DB:-mdm_db}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Redis 7 - 设备影子缓存
  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 300
      --databases 16
    volumes:
      - redis_data:/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # EMQX 5.0 - MQTT Broker
  emqx:
    image: emqx/emqx:5.0
    container_name: mdm-emqx
    restart: always
    environment:
      EMQX_NAME: mdm-emqx
      EMQX_HOST: ${EMQX_HOST:-emqx}
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_ADMIN_USER:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_ADMIN_PASSWORD:?EMQX_ADMIN_PASSWORD must be set}
      EMQX_LISTENERS__TCP__DEFAULT: 1883
      EMQX_LISTENERS__WS__DEFAULT: 8083
      EMQX_LISTENERS__API__DEFAULT: 18083
      EMQX__LISTENERS__TCP__DEFAULT__MAX_CONNECTIONS: 102400
      EMQX__MQTT__MAX_MQUEUE_LEN: 1000
      EMQX__MQTT__MAX_CLIENTID_LEN: 128
      EMQX__MQTT__RETRY__INTERVAL: 30s
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_data:/opt/emqx/log
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "127.0.0.1:1883:1883"  # MQTT - 本地
      - "127.0.0.1:8083:8083"  # WebSocket - 本地
      - "127.0.0.1:18083:18083" # Dashboard - 本地（通过 Nginx 反向代理访问）
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD", "emqx", "_ctl", "status"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  # MDM Backend - Golang API 服务
  mdm-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    container_name: mdm-backend
    restart: always
    environment:
      # 数据库
      DATABASE_URL: postgres://${POSTGRES_USER:-mdm_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mdm_db}?sslmode=disable
      # Redis
      REDIS_URL: redis://redis:6379
      # JWT 密钥 - 必须通过环境变量注入
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set - generate with: openssl rand -base64 32}
      # CORS 白名单 - 生产环境必须配置具体域名
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set - e.g. https://mdm.example.com}
      # 服务端口
      PORT: "8080"
      # MQTT Broker 地址
      MQTT_BROKER: tcp://emqx:1883
      MQTT_USERNAME: ${EMQX_ADMIN_USER:-admin}
      MQTT_PASSWORD: ${EMQX_ADMIN_PASSWORD}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  # MDM Frontend - Vue3 + Nginx (生产构建)
  mdm-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.mdm.example.com}
    container_name: mdm-frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - mdm-backend
    networks:
      - mdm-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # Nginx 反向代理（可选，生产环境推荐使用）
  nginx-proxy:
    image: nginx:alpine
    container_name: mdm-nginx-proxy
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/nginx/logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - mdm-backend
      - mdm-frontend
    networks:
      - mdm-network
