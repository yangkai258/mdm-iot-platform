<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 - MDM控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #001529 0%, #003a70 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-container { 
      width: 400px; background: #fff; border-radius: 12px; 
      padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .icon { font-size: 48px; margin-bottom: 12px; }
    .login-logo .title { font-size: 24px; font-weight: 600; color: #1f2329; }
    .login-logo .subtitle { font-size: 14px; color: #646a73; margin-top: 8px; }
    
    .login-form .form-item { margin-bottom: 20px; }
    .login-form label { display: block; font-size: 14px; color: #4e5969; margin-bottom: 8px; }
    .login-form input { 
      width: 100%; height: 44px; padding: 0 16px; border: 1px solid #d9d9d9; 
      border-radius: 8px; font-size: 14px; transition: all 0.2s;
    }
    .login-form input:focus { border-color: #165qff; outline: none; box-shadow: 0 0 0 2px rgba(22,93,255,0.1); }
    
    .login-btn { 
      width: 100%; height: 44px; background: #165qff; color: #fff; 
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #4080ff; }
    .login-btn:disabled { background: #94bfff; cursor: not-allowed; }
    
    .login-tip { text-align: center; margin-top: 20px; font-size: 13px; color: #969799; }
    .login-error { 
      background: #fff1f0; border: 1px solid #ffccc7; color: #f53f3f; 
      padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="icon">🏠</div>
      <div class="title">MDM 控制中台</div>
      <div class="subtitle">设备管理解决方案</div>
    </div>
    
    <div class="login-form">
      <div id="errorMsg" style="display: none;"></div>
      
      <div class="form-item">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" value="admin">
      </div>
      
      <div class="form-item">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" value="admin123" @keyup.enter="doLogin">
      </div>
      
      <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
      
      <div class="login-tip">
        默认账号: admin / admin123
      </div>
    </div>
  </div>

  <script>
    function showError(msg) {
      var el = document.getElementById('errorMsg');
      el.style.display = 'block';
      el.className = 'login-error';
      el.innerHTML = msg;
    }
    
    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
    
    function doLogin() {
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var btn = document.getElementById('loginBtn');
      
      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }
      
      hideError();
      btn.disabled = true;
      btn.innerText = '登录中...';
      
      fetch('http://localhost:8080/api/v1/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: username, password: password})
      })
      .then(r => r.json())
      .then(data => {
        if (data.code === 0) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('userInfo', JSON.stringify(data.data.user || {username: username}));
          // 跳转到布局页面
          setTimeout(() => location.href = '/layout.html', 500);
        } else {
          showError(data.message || '登录失败');
          btn.disabled = false;
          btn.innerText = '登 录';
        }
      })
      .catch(e => {
        showError('网络错误，请检查后端服务是否启动');
        btn.disabled = false;
        btn.innerText = '登 录';
      });
    }
  </script>
</body>
</html>
