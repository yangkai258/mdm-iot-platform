<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDM 控制中台 - 首页</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f2f3f5; }
    .header { background: #165qff; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 500; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .welcome { background: linear-gradient(135deg, #165qff 0%, #4080ff 100%); color: #fff; padding: 32px; border-radius: 8px; margin-bottom: 24px; }
    .welcome h2 { font-size: 24px; margin-bottom: 8px; }
    .welcome p { opacity: 0.9; }
    .module-group { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .module-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #e5e6eb; }
    .module-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .module-item { padding: 12px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    .module-item:hover { background: #f2f3f5; }
    .module-item a { color: #1f2329; text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .module-item a:hover { color: #165qff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏠 MDM 控制中台</h1>
    <div style="display: flex; align-items: center; gap: 12px;">
      <span>管理员</span>
      <a href="login.html" style="color: #fff; text-decoration: none;">退出</a>
    </div>
  </div>

  <div class="container">
    <div class="welcome">
      <h2>欢迎使用 MDM 设备管理平台</h2>
      <p>企业级物联网设备管理解决方案</p>
    </div>

    <!-- 设备管理 -->
    <div class="module-group">
      <div class="module-title">📱 设备管理</div>
      <div class="module-list">
        <div class="module-item"><a href="dashboard.html">📊 仪表盘</a></div>
        <div class="module-item"><a href="devices.html">📋 设备列表</a></div>
        <div class="module-item"><a href="ota.html">🔄 OTA固件</a></div>
        <div class="module-item"><a href="alert.html">🚨 告警管理</a></div>
      </div>
    </div>

    <!-- 组织管理 -->
    <div class="module-group">
      <div class="module-title">🏢 组织管理</div>
      <div class="module-list">
        <div class="module-item"><a href="company.html">🏢 公司管理</a></div>
        <div class="module-item"><a href="department.html">📂 部门管理</a></div>
        <div class="module-item"><a href="employee.html">👥 员工管理</a></div>
      </div>
    </div>

    <!-- 流程管理 -->
    <div class="module-group">
      <div class="module-title">🔀 流程管理</div>
      <div class="module-list">
        <div class="module-item"><a href="workflow-design.html">🎨 流程设计</a></div>
        <div class="module-item"><a href="todo.html">📥 待办任务</a></div>
        <div class="module-item"><a href="done.html">✅ 已办任务</a></div>
      </div>
    </div>

    <!-- 基础管理 -->
    <div class="module-group">
      <div class="module-title">⚙️ 基础管理</div>
      <div class="module-list">
        <div class="module-item"><a href="dict.html">📖 数据字典</a></div>
        <div class="module-item"><a href="menu.html">📑 菜单设置</a></div>
        <div class="module-item"><a href="broadcast.html">📢 系统广播</a></div>
      </div>
    </div>

    <!-- 效率套件 -->
    <div class="module-group">
      <div class="module-title">🚀 效率套件</div>
      <div class="module-list">
        <div class="module-item"><a href="test-form.html">🧪 测试表单</a></div>
        <div class="module-item"><a href="test-request.html">📡 测试POST</a></div>
      </div>
    </div>

    <!-- 系统管理 -->
    <div class="module-group">
      <div class="module-title">🔐 系统管理</div>
      <div class="module-list">
        <div class="module-item"><a href="role.html">🔐 角色管理</a></div>
        <div class="module-item"><a href="user.html">👤 用户管理</a></div>
        <div class="module-item"><a href="sys-param.html">⚙️ 系统参数</a></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
