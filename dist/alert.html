<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>告警管理 - MDM 控制中台</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #001529; color: #fff; padding-top: 20px; }
    .menu-item { padding: 14px 24px; cursor: pointer; }
    .menu-item:hover, .menu-item.active { background: #1890ff; }
    .main { margin-left: 200px; padding: 20px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div style="padding: 0 24px 20px; font-size: 18px; font-weight: bold;">MDM 控制台</div>
    <div class="menu-item" onclick="location.href='/dashboard.html'">设备大盘</div>
    <div class="menu-item" onclick="location.href='/devices.html'">设备列表</div>
    <div class="menu-item" onclick="location.href='/ota.html'">OTA固件</div>
    <div class="menu-item active" onclick="location.href='/alert.html'">告警管理</div>
    <div class="menu-item" onclick="localStorage.clear(); location.href='/login.html'">退出登录</div>
  </div>
  
  <div class="main">
    <h2>告警管理</h2>
    <button onclick="loadAlerts()">刷新</button>
    <div id="list" style="margin-top: 20px;"></div>
  </div>

  <script>
    var token = localStorage.getItem('token');
    if (!token) location.href = '/login.html';
    
    function loadAlerts() {
      fetch('http://localhost:8080/api/v1/alerts', {
        headers: {'Authorization': 'Bearer ' + token}
      }).then(r => r.json()).then(data => {
        var list = data.data?.list || [];
        var html = '<table border="1" cellpadding="10" style="width:100%;border-collapse:collapse"><tr><th>设备ID</th><th>类型</th><th>消息</th><th>严重程度</th><th>状态</th><th>时间</th></tr>';
        list.forEach(a => {
          html += '<tr><td>' + a.device_id + '</td><td>' + a.alert_type + '</td><td>' + a.message + '</td><td>' + a.severity + '</td><td>' + (a.status===1?'未处理':'已解决') + '</td><td>' + a.created_at + '</td></tr>';
        });
        if (!list.length) html += '<tr><td colspan="6" style="text-align:center">暂无告警</td></tr>';
        html += '</table>';
        document.getElementById('list').innerHTML = html;
      });
    }
    loadAlerts();
  </script>
</body>
</html>
