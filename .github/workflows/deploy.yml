name: Build & Push Docker Images

on:
  workflow_run:
    workflow: Build & Test
    types: [completed]
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================
  # Job 1: Build Docker Images (triggered only after main build passes)
  # ============================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: mdm-backend-binary
          path: backend/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: mdm-frontend-dist
          path: frontend/dist/

      - name: Move backend binary to root
        run: mv backend/mdm-server-linux ./

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/mdm-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/mdm-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/mdm-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/mdm-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 2: Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-docker
    environment: staging
    steps:
      - name: Checkout infra configs
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            .env.staging
          sparse-checkout-cone-mode: false

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd ${{ secrets.STAGING_APP_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Verify staging deployment
        run: |
          echo "Waiting for services to start..."
          sleep 15
          echo "Checking backend health..."
          curl -sf http://${{ secrets.STAGING_HOST }}/health || echo "Backend may still be starting"

  # ============================================================
  # Job 3: Deploy to Production (manual approval required)
  # ============================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-docker
    environment:
      name: production
      url: ${{ secrets.PROD_URL }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout infra configs
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
            .env.production
          sparse-checkout-cone-mode: false

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_APP_DIR }}
            docker compose pull
            docker compose up -d
            docker image prune -f

      - name: Verify production deployment
        run: |
          echo "Waiting for services to start..."
          sleep 20
          echo "Checking backend health..."
          curl -sf http://${{ secrets.PROD_HOST }}/health || echo "Backend may still be starting"
