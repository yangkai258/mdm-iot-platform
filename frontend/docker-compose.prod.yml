version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: mdm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdm_user
      POSTGRES_PASSWORD: mdm_password
      POSTGRES_DB: mdm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdm_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mdm_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdm_network

  # EMQX MQTT broker
  mqtt:
    image: emqx/emqx:5.3
    container_name: mdm_emqx
    restart: unless-stopped
    environment:
      EMQX_NAME: mdm_mqtt
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
      EMQX_AUTH__SIMPLE__DEFAULT_USERNAME: admin
      EMQX_AUTH__SIMPLE__DEFAULT_PASSWORD: public
    volumes:
      - mqtt_data:/opt/emqx/data
      - mqtt_log:/opt/emqx/log
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mdm_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdm_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://mdm_user:mdm_password@postgres:5432/mdm_db
      REDIS_URL: redis://:redis_password@redis:6379
      MQTT_BROKER: tcp://mqtt:1883
      PORT: 8080
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mdm_network

  # Frontend Nginx
  frontend:
    image: nginx:alpine
    container_name: mdm_frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mdm_network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: mdm_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mdm_network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: mdm_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - mdm_network

volumes:
  postgres_data:
  redis_data:
  mqtt_data:
  mqtt_log:
  prometheus_data:
  grafana_data:

networks:
  mdm_network:
    driver: bridge
