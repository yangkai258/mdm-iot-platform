<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统参数 - MDM控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@arco-design/web-vue@2.11.0/dist/arco.min.js"></script>
  <style>
    body { margin: 0; background: #f2f3f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 16px 20px; border-radius: 4px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .card { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <div class="header">
      <h2>⚙️ 系统参数设置</h2>
      <a-button type="primary" @click="saveAll">保存全部</a-button>
    </div>

    <a-tabs v-model="activeTab">
      <a-tab-pane key="basic" title="基础配置"></a-tab-pane>
      <a-tab-pane key="email" title="邮件配置"></a-tab-pane>
      <a-tab-pane key="sms" title="短信配置"></a-tab-pane>
      <a-tab-pane key="security" title="安全配置"></a-tab-pane>
    </a-tabs>

    <!-- 基础配置 -->
    <div v-if="activeTab === 'basic'" class="card">
      <a-form layout="vertical">
        <a-form-item label="系统名称">
          <a-input v-model="params.system_name" placeholder="MDM 控制中台" />
        </a-form-item>
        <a-form-item label="系统Logo">
          <a-input v-model="params.logo_url" placeholder="https://..." />
        </a-form-item>
        <a-form-item label="公司名称">
          <a-input v-model="params.company_name" placeholder="请输入公司名称" />
        </a-form-item>
        <a-form-item label="默认分页大小">
          <a-input-number v-model="params.page_size" :min="10" :max="100" />
        </a-form-item>
        <a-form-item label="文件上传大小限制 (MB)">
          <a-input-number v-model="params.upload_max_size" :min="1" :max="100" />
        </a-form-item>
      </a-form>
    </div>

    <!-- 邮件配置 -->
    <div v-if="activeTab === 'email'" class="card">
      <a-form layout="vertical">
        <a-form-item label="SMTP服务器">
          <a-input v-model="emailConfig.smtp_host" placeholder="smtp.example.com" />
        </a-form-item>
        <a-form-item label="SMTP端口">
          <a-input-number v-model="emailConfig.smtp_port" :min="1" :max="65535" />
        </a-form-item>
        <a-form-item label="用户名">
          <a-input v-model="emailConfig.username" placeholder="noreply@example.com" />
        </a-form-item>
        <a-form-item label="密码">
          <a-input-password v-model="emailConfig.password" placeholder="请输入密码" />
        </a-form-item>
        <a-form-item label="发件人名称">
          <a-input v-model="emailConfig.from_name" placeholder="MDM系统" />
        </a-form-item>
        <a-form-item label="是否启用SSL">
          <a-switch v-model="emailConfig.use_ssl" checked-value="1" unchecked-value="0" />
        </a-form-item>
        <a-form-item>
          <a-button type="outline" @click="testEmail">发送测试邮件</a-button>
        </a-form-item>
      </a-form>
    </div>

    <!-- 短信配置 -->
    <div v-if="activeTab === 'sms'" class="card">
      <a-form layout="vertical">
        <a-form-item label="短信服务商">
          <a-select v-model="smsConfig.provider" placeholder="请选择">
            <a-option value="aliyun">阿里云</a-option>
            <a-option value="tencent">腾讯云</a-option>
            <a-option value="huawei">华为云</a-option>
          </a-select>
        </a-form-item>
        <a-form-item label="AccessKey ID">
          <a-input v-model="smsConfig.access_key_id" placeholder="请输入AccessKey ID" />
        </a-form-item>
        <a-form-item label="AccessKey Secret">
          <a-input-password v-model="smsConfig.access_key_secret" placeholder="请输入AccessKey Secret" />
        </a-form-item>
        <a-form-item label="签名">
          <a-input v-model="smsConfig.sign_name" placeholder="请输入短信签名" />
        </a-form-item>
      </a-form>
    </div>

    <!-- 安全配置 -->
    <div v-if="activeTab === 'security'" class="card">
      <a-form layout="vertical">
        <a-form-item label="密码最小长度">
          <a-input-number v-model="securityConfig.password_min_length" :min="6" :max="32" />
        </a-form-item>
        <a-form-item label="密码过期天数">
          <a-input-number v-model="securityConfig.password_expire_days" :min="0" />
        </a-form-item>
        <a-form-item label="登录失败锁定次数">
          <a-input-number v-model="securityConfig.max_login_attempts" :min="3" :max="10" />
        </a-form-item>
        <a-form-item label="会话超时时间 (分钟)">
          <a-input-number v-model="securityConfig.session_timeout" :min="5" :max="480" />
        </a-form-item>
        <a-form-item label="是否允许同一账号多处登录">
          <a-switch v-model="securityConfig.allow_multi_login" checked-value="1" unchecked-value="0" />
        </a-form-item>
        <a-form-item label="操作日志保留天数">
          <a-input-number v-model="securityConfig.log_retention_days" :min="30" />
        </a-form-item>
      </a-form>
    </div>
  </div>
</div>

<script>
const { createApp, ref, reactive } = Vue;

const app = createApp({
  setup() {
    const activeTab = ref('basic');
    
    const params = reactive({
      system_name: 'MDM 控制中台',
      logo_url: '',
      company_name: '某某科技有限公司',
      page_size: 10,
      upload_max_size: 10
    });

    const emailConfig = reactive({
      smtp_host: 'smtp.qq.com',
      smtp_port: 465,
      username: '',
      password: '',
      from_name: 'MDM系统',
      use_ssl: '1'
    });

    const smsConfig = reactive({
      provider: 'aliyun',
      access_key_id: '',
      access_key_secret: '',
      sign_name: ''
    });

    const securityConfig = reactive({
      password_min_length: 6,
      password_expire_days: 90,
      max_login_attempts: 5,
      session_timeout: 30,
      allow_multi_login: '1',
      log_retention_days: 90
    });

    const saveAll = () => {
      Arco.Message.success('保存成功');
    };

    const testEmail = () => {
      Arco.Message.info('测试邮件已发送');
    };

    return {
      activeTab,
      params,
      emailConfig,
      smsConfig,
      securityConfig,
      saveAll,
      testEmail
    };
  }
});

app.use(ArcoVue);
app.mount('#app');
</script>
</body>
</html>
