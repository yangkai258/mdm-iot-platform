<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司管理 - MDM控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@arco-design/web-vue@2.11.0/dist/arco.min.js"></script>
  <style>
    body { margin: 0; background: #f2f3f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 16px 20px; border-radius: 4px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
    .table-card { background: #fff; border-radius: 4px; }
    .pagination { display: flex; justify-content: flex-end; padding: 16px; }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <div class="header">
      <h2>公司管理</h2>
      <a-space>
        <a-button type="primary" @click="showAddModal = true">新增公司</a-button>
      </a-space>
    </div>

    <div class="search-bar">
      <a-input-search placeholder="搜索公司名称/编码" style="width: 300px" @search="loadData" v-model="keyword" search-button />
      <a-select placeholder="状态" style="width: 120px" v-model="status" @change="loadData" allow-clear>
        <a-option :value="1">正常</a-option>
        <a-option :value="0">禁用</a-option>
      </a-select>
      <a-button @click="loadData">刷新</a-button>
    </div>

    <div class="table-card">
      <a-table :columns="columns" :data="data" :loading="loading" :pagination="false" stripe>
        <template #status="{ record }">
          <a-tag :color="record.status === 1 ? 'green' : 'red'">{{ record.status === 1 ? '正常' : '禁用' }}</a-tag>
        </template>
        <template #operations="{ record }">
          <a-space>
            <a-link @click="editRecord(record)">编辑</a-link>
            <a-link status="danger" @click="deleteRecord(record)">删除</a-link>
          </a-space>
        </template>
      </a-table>
      <div class="pagination">
        <a-pagination :total="total" :current="page" :page-size="pageSize" @change="changePage" show-total />
      </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <a-modal v-model:visible="showAddModal" :title="editId ? '编辑公司' : '新增公司'" @before-ok="submitForm" unmount-on-close>
      <a-form :model="form" ref="formRef" layout="vertical">
        <a-form-item field="company_code" label="公司编码" required>
          <a-input v-model="form.company_code" placeholder="请输入公司编码" />
        </a-form-item>
        <a-form-item field="company_name" label="公司名称" required>
          <a-input v-model="form.company_name" placeholder="请输入公司名称" />
        </a-form-item>
        <a-form-item field="short_name" label="简称">
          <a-input v-model="form.short_name" placeholder="请输入简称" />
        </a-form-item>
        <a-form-item field="province" label="省份">
          <a-input v-model="form.province" placeholder="请输入省份" />
        </a-form-item>
        <a-form-item field="city" label="城市">
          <a-input v-model="form.city" placeholder="请输入城市" />
        </a-form-item>
        <a-form-item field="district" label="区县">
          <a-input v-model="form.district" placeholder="请输入区县" />
        </a-form-item>
        <a-form-item field="address" label="详细地址">
          <a-input v-model="form.address" placeholder="请输入详细地址" />
        </a-form-item>
        <a-form-item field="legal_person" label="法人代表">
          <a-input v-model="form.legal_person" placeholder="请输入法人代表" />
        </a-form-item>
        <a-form-item field="contact" label="联系人">
          <a-input v-model="form.contact" placeholder="请输入联系人" />
        </a-form-item>
        <a-form-item field="phone" label="联系电话">
          <a-input v-model="form.phone" placeholder="请输入联系电话" />
        </a-form-item>
        <a-form-item field="email" label="邮箱">
          <a-input v-model="form.email" placeholder="请输入邮箱" />
        </a-form-item>
        <a-form-item field="status" label="状态">
          <a-switch v-model="form.status" checked-value="1" unchecked-value="0" />
        </a-form-item>
        <a-form-item field="sort" label="排序">
          <a-input-number v-model="form.sort" :min="0" placeholder="数值越小越靠前" />
        </a-form-item>
        <a-form-item field="remark" label="备注">
          <a-textarea v-model="form.remark" placeholder="请输入备注" />
        </a-form-item>
      </a-form>
    </a-modal>
  </div>
</div>

<script>
const { createApp, ref, reactive, onMounted } = Vue;

const API_BASE = 'http://localhost:8080/api/v1';

const app = createApp({
  setup() {
    const loading = ref(false);
    const data = ref([]);
    const total = ref(0);
    const page = ref(1);
    const pageSize = ref(10);
    const keyword = ref('');
    const status = ref('');
    const showAddModal = ref(false);
    const editId = ref(null);
    const formRef = ref(null);

    const form = reactive({
      company_code: '',
      company_name: '',
      short_name: '',
      province: '',
      city: '',
      district: '',
      address: '',
      legal_person: '',
      contact: '',
      phone: '',
      email: '',
      status: 1,
      sort: 0,
      remark: ''
    });

    const columns = [
      { title: '公司编码', dataIndex: 'company_code', width: 120 },
      { title: '公司名称', dataIndex: 'company_name' },
      { title: '简称', dataIndex: 'short_name', width: 100 },
      { title: '省份', dataIndex: 'province', width: 80 },
      { title: '城市', dataIndex: 'city', width: 80 },
      { title: '联系人', dataIndex: 'contact', width: 100 },
      { title: '联系电话', dataIndex: 'phone', width: 120 },
      { title: '状态', dataIndex: 'status', slotName: 'status', width: 80 },
      { title: '排序', dataIndex: 'sort', width: 60 },
      { title: '操作', slotName: 'operations', width: 120 }
    ];

    const loadData = async () => {
      loading.value = true;
      try {
        const token = localStorage.getItem('token');
        const params = new URLSearchParams({
          page: page.value,
          page_size: pageSize.value,
          keyword: keyword.value
        });
        if (status.value) params.append('status', status.value);
        
        const res = await fetch(`${API_BASE}/org/companies?${params}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        if (json.code === 0) {
          data.value = json.data.list;
          total.value = json.data.total;
        }
      } catch (e) {
        console.error(e);
      } finally {
        loading.value = false;
      }
    };

    const changePage = (p) => {
      page.value = p;
      loadData();
    };

    const resetForm = () => {
      Object.assign(form, {
        company_code: '',
        company_name: '',
        short_name: '',
        province: '',
        city: '',
        district: '',
        address: '',
        legal_person: '',
        contact: '',
        phone: '',
        email: '',
        status: 1,
        sort: 0,
        remark: ''
      });
      editId.value = null;
    };

    const editRecord = (record) => {
      editId.value = record.id;
      Object.assign(form, record);
      showAddModal.value = true;
    };

    const deleteRecord = async (record) => {
      try {
        const token = localStorage.getItem('token');
        const res = await fetch(`${API_BASE}/org/companies/${record.id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const json = await res.json();
        if (json.code === 0) {
          loadData();
        } else {
          alert(json.message);
        }
      } catch (e) {
        console.error(e);
      }
    };

    const submitForm = async (done) => {
      try {
        const token = localStorage.getItem('token');
        const url = editId.value 
          ? `${API_BASE}/org/companies/${editId.value}` 
          : `${API_BASE}/org/companies`;
        const method = editId.value ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
          method,
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(form)
        });
        const json = await res.json();
        if (json.code === 0) {
          showAddModal.value = false;
          resetForm();
          loadData();
        } else {
          alert(json.message);
        }
      } catch (e) {
        console.error(e);
      }
      done(true);
    };

    onMounted(() => {
      loadData();
    });

    return {
      loading,
      data,
      total,
      page,
      pageSize,
      keyword,
      status,
      showAddModal,
      editId,
      form,
      formRef,
      columns,
      loadData,
      changePage,
      editRecord,
      deleteRecord,
      submitForm
    };
  }
});

app.use(ArcoVue);
app.mount('#app');
</script>
</body>
</html>
