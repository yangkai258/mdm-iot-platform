<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试POST请求 - MDM控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@arco-design/web-vue@2.11.0/dist/arco.min.js"></script>
  <style>
    body { margin: 0; background: #f2f3f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 16px 20px; border-radius: 4px; margin-bottom: 16px; }
    .card { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 16px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <div class="header">
      <h2>🧪 测试POST请求工具</h2>
      <p style="color: #666; margin-top: 8px;">用于调试 M5Stack 设备的 MQTT 指令</p>
    </div>

    <div class="card">
      <a-form layout="vertical">
        <a-form-item label="请求方法">
          <a-radio-group v-model="method">
            <a-radio value="GET">GET</a-radio>
            <a-radio value="POST">POST</a-radio>
            <a-radio value="PUT">PUT</a-radio>
            <a-radio value="DELETE">DELETE</a-radio>
          </a-radio-group>
        </a-form-item>
        <a-form-item label="API URL">
          <a-input v-model="url" placeholder="http://localhost:8080/api/v1/..." style="width: 100%;" />
        </a-form-item>
        <a-form-item label="请求头 (JSON)">
          <a-textarea v-model="headers" placeholder='{"Authorization": "Bearer xxx"}' :rows="3" />
        </a-form-item>
        <a-form-item label="请求体 (JSON)">
          <a-textarea v-model="body" placeholder='{"key": "value"}' :rows="6" />
        </a-form-item>
        <a-form-item>
          <a-space>
            <a-button type="primary" @click="sendRequest" :loading="loading">发送请求</a-button>
            <a-button @click="clearResponse">清空响应</a-button>
            <a-button @click="loadExample">加载示例</a-button>
          </a-space>
        </a-form-item>
      </a-form>
    </div>

    <div class="card" v-if="response">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3>响应结果</h3>
        <a-tag :color="responseStatusColor">{{ responseStatus }}</a-tag>
      </div>
      <a-textarea :value="response" :rows="12" readonly style="font-family: monospace;" />
    </div>

    <!-- 预设示例 -->
    <div class="card">
      <h3>📝 预设示例</h3>
      <a-space wrap>
        <a-button v-for="ex in examples" :key="ex.name" @click="loadExample(ex)">
          {{ ex.name }}
        </a-button>
      </a-space>
    </div>
  </div>
</div>

<script>
const { createApp, ref, computed } = Vue;
const API_BASE = 'http://localhost:8080/api/v1';

const app = createApp({
  setup() {
    const method = ref('POST');
    const url = ref(API_BASE + '/devices/register');
    const headers = ref('{"Content-Type": "application/json"}');
    const body = ref('{\n  "mac_address": "AA:BB:CC:DD:EE:01",\n  "sn_code": "TEST001",\n  "hardware_model": "M5Stack",\n  "firmware_version": "1.0.0"\n}');
    const loading = ref(false);
    const response = ref('');
    const responseStatus = ref(0);

    const responseStatusColor = computed(() => {
      if (responseStatus.value >= 200 && responseStatus.value < 300) return 'green';
      if (responseStatus.value >= 400) return 'red';
      return 'orange';
    });

    const examples = [
      {
        name: '设备注册',
        method: 'POST',
        url: API_BASE + '/devices/register',
        body: '{"mac_address": "AA:BB:CC:DD:EE:01", "sn_code": "TEST001", "hardware_model": "M5Stack", "firmware_version": "1.0.0"}'
      },
      {
        name: '设备列表',
        method: 'GET',
        url: API_BASE + '/devices',
        body: ''
      },
      {
        name: '发送指令',
        method: 'POST',
        url: API_BASE + '/devices/DEV001/commands',
        body: '{"command": "setwifi", "params": {"ssid": "TestAP", "password": "123456"}}'
      },
      {
        name: 'OTA检查',
        method: 'GET',
        url: API_BASE + '/ota/devices/DEV001/check',
        body: ''
      }
    ];

    const sendRequest = async () => {
      loading.value = true;
      response.value = '';
      try {
        const options = {
          method: method.value,
          headers: JSON.parse(headers.value || '{}')
        };
        if (body.value && method.value !== 'GET') {
          options.body = body.value;
        }
        
        const res = await fetch(url.value, options);
        responseStatus.value = res.status;
        const text = await res.text();
        try {
          response.value = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          response.value = text;
        }
      } catch (e) {
        response.value = 'Error: ' + e.message;
        responseStatus.value = 0;
      } finally {
        loading.value = false;
      }
    };

    const clearResponse = () => {
      response.value = '';
      responseStatus.value = 0;
    };

    const loadExample = (ex) => {
      if (ex) {
        method.value = ex.method;
        url.value = ex.url;
        body.value = ex.body || '';
      } else {
        method.value = examples[0].method;
        url.value = examples[0].url;
        body.value = examples[0].body;
      }
    };

    return {
      method,
      url,
      headers,
      body,
      loading,
      response,
      responseStatus,
      responseStatusColor,
      examples,
      sendRequest,
      clearResponse,
      loadExample
    };
  }
});

app.use(ArcoVue);
app.mount('#app');
</script>
</body>
</html>
