<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OTA固件 - MDM 控制中台</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #001529; color: #fff; padding-top: 20px; }
    .menu-item { padding: 14px 24px; cursor: pointer; }
    .menu-item:hover, .menu-item.active { background: #1890ff; }
    .main { margin-left: 200px; padding: 20px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div style="padding: 0 24px 20px; font-size: 18px; font-weight: bold;">MDM 控制台</div>
    <div class="menu-item" onclick="location.href='/dashboard.html'">设备大盘</div>
    <div class="menu-item" onclick="location.href='/devices.html'">设备列表</div>
    <div class="menu-item active" onclick="location.href='/ota.html'">OTA固件</div>
    <div class="menu-item" onclick="location.href='/alert.html'">告警管理</div>
    <div class="menu-item" onclick="localStorage.clear(); location.href='/login.html'">退出登录</div>
  </div>
  
  <div class="main">
    <h2>OTA 固件管理</h2>
    <button onclick="loadPackages()">刷新</button>
    <div id="list" style="margin-top: 20px;"></div>
  </div>

  <script>
    var token = localStorage.getItem('token');
    if (!token) location.href = '/login.html';
    
    function loadPackages() {
      fetch('http://localhost:8080/api/v1/ota/packages', {
        headers: {'Authorization': 'Bearer ' + token}
      }).then(r => r.json()).then(data => {
        var list = data.data?.list || [];
        var html = '<table border="1" cellpadding="10" style="width:100%;border-collapse:collapse"><tr><th>版本</th><th>硬件型号</th><th>文件URL</th><th>MD5</th><th>状态</th></tr>';
        list.forEach(p => {
          html += '<tr><td>' + p.version_code + '</td><td>' + p.hardware_model + '</td><td>' + p.bin_url + '</td><td>' + p.md5_hash + '</td><td>' + (p.release_status||0) + '</td></tr>';
        });
        if (!list.length) html += '<tr><td colspan="5" style="text-align:center">暂无固件</td></tr>';
        html += '</table>';
        document.getElementById('list').innerHTML = html;
      });
    }
    loadPackages();
  </script>
</body>
</html>
