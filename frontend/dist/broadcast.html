<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统广播 - MDM控制台</title>
  <link href="https://cdn.jsdelivr.net/npm/arco-design@2.11.0/dist/arco.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@arco-design/web-vue@2.11.0/dist/arco.min.js"></script>
  <style>
    body { margin: 0; background: #f2f3f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 16px 20px; border-radius: 4px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .card { background: #fff; border-radius: 4px; padding: 20px; }
    .broadcast { padding: 16px; border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
    .broadcast:hover { transform: translateX(4px); }
    .broadcast-info { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
<div id="app">
  <div class="container">
    <div class="header">
      <h2>📢 系统广播</h2>
      <a-space>
        <a-button type="primary" @click="showPublishModal = true">发布广播</a-button>
      </a-space>
    </div>

    <div class="card">
      <a-tabs v-model="activeTab">
        <a-tab-pane key="all">全部广播</a-tab-pane>
        <a-tab-pane key="important">重要</a-tab-pane>
        <a-tab-pane key="normal">普通</a-tab-pane>
      </a-tabs>

      <div v-for="item in filteredList" :key="item.id" class="broadcast" :style="{ background: levelBg[item.level] }">
        <div class="broadcast-info">
          <div>
            <a-tag :color="levelColor[item.level]" style="margin-right: 8px;">{{ levelText[item.level] }}</a-tag>
            <strong>{{ item.title }}</strong>
          </div>
          <div style="color: #666; font-size: 12px;">{{ item.create_time }}</div>
        </div>
        <div style="margin-top: 8px; color: #333;">{{ item.content }}</div>
        <div style="margin-top: 8px; color: #999; font-size: 12px;">
          发布人: {{ item.creator }} | 阅读: {{ item.read_count }}
        </div>
      </div>

      <div v-if="filteredList.length === 0" style="text-align: center; color: #999; padding: 40px;">
        暂无广播
      </div>
    </div>

    <!-- 发布广播弹窗 -->
    <a-modal v-model:visible="showPublishModal" title="发布广播" @before-ok="submitPublish" unmount-on-close>
      <a-form :model="form" layout="vertical">
        <a-form-item label="广播标题" required>
          <a-input v-model="form.title" placeholder="请输入广播标题" />
        </a-form-item>
        <a-form-item label="广播内容" required>
          <a-textarea v-model="form.content" placeholder="请输入广播内容" :rows="4" />
        </a-form-item>
        <a-form-item label="重要程度">
          <a-radio-group v-model="form.level">
            <a-radio value="1">普通</a-radio>
            <a-radio value="2">重要</a-radio>
            <a-radio value="3">紧急</a-radio>
          </a-radio-group>
        </a-form-item>
        <a-form-item label="生效时间">
          <a-date-picker v-model="form.start_time" style="width: 100%;" />
        </a-form-item>
        <a-form-item label="失效时间">
          <a-date-picker v-model="form.end_time" style="width: 100%;" />
        </a-form-item>
      </a-form>
    </a-modal>
  </div>
</div>

<script>
const { createApp, ref, reactive, computed } = Vue;

const app = createApp({
  setup() {
    const activeTab = ref('all');
    const showPublishModal = ref(false);
    
    const form = reactive({
      title: '',
      content: '',
      level: '1',
      start_time: '',
      end_time: ''
    });

    const list = ref([
      { id: 1, title: '系统维护通知', content: '将于今晚22:00-24:00进行系统维护，届时部分功能可能无法使用，请提前保存数据。', level: '3', create_time: '2026-03-19 10:00', creator: '系统管理员', read_count: 156 },
      { id: 2, title: '新功能上线', content: '设备批量导入功能已上线，支持Excel文件批量导入设备信息。', level: '2', create_time: '2026-03-18 15:30', creator: '产品经理', read_count: 89 },
      { id: 3, title: '固件升级提醒', content: 'M5Stack v1.2.0 固件已发布，建议尽快升级以获得最新功能和安全性修复。', level: '2', create_time: '2026-03-17 09:00', creator: '运维工程师', read_count: 234 },
      { id: 4, title: '周报已更新', content: '本周系统运行报告已生成，可前往仪表盘查看详细数据。', level: '1', create_time: '2026-03-15 10:00', creator: '系统', read_count: 67 },
    ]);

    const levelText = { '1': '普通', '2': '重要', '3': '紧急' };
    const levelColor = { '1': 'gray', '2': 'orange', '3': 'red' };
    const levelBg = { '1': '#f2f3f5', '2': '#fff7e6', '3': '#fff1e8' };

    const filteredList = computed(() => {
      if (activeTab.value === 'all') return list.value;
      if (activeTab.value === 'important') return list.value.filter(i => i.level !== '1');
      if (activeTab.value === 'normal') return list.value.filter(i => i.level === '1');
      return list.value;
    });

    const submitPublish = (done) => {
      if (!form.title || !form.content) {
        Arco.Message.error('请填写完整信息');
        done(false);
        return;
      }
      list.value.unshift({
        id: Date.now(),
        title: form.title,
        content: form.content,
        level: form.level,
        create_time: new Date().toLocaleString(),
        creator: '当前用户',
        read_count: 0
      });
      Arco.Message.success('发布成功');
      showPublishModal.value = false;
      Object.assign(form, { title: '', content: '', level: '1', start_time: '', end_time: '' });
      done(true);
    };

    return {
      activeTab,
      list,
      filteredList,
      showPublishModal,
      form,
      levelText,
      levelColor,
      levelBg,
      submitPublish
    };
  }
});

app.use(ArcoVue);
app.mount('#app');
</script>
</body>
</html>
